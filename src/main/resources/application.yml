spring:
  application:
    name: java-interview-prep-platform
  datasource:
    url: jdbc:mysql://localhost:3306/interview_prep
    username: root
    password: root
  jpa:
    defer-datasource-initialization: true
    show-sql: false
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379

server:
  tomcat:
    mbeanregistry:
      enabled: true
    threads:
      max: 5

app:
  jwt:
    secret: 1234567890123456789012345678901234567890
    expiration: 300000
  refresh-token:
    expiration: 86400000
  demo:
    payment-base-url: http://localhost:8080

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers,threaddump,heapdump
  endpoint:
    health:
      show-details: when_authorized
      roles: ADMIN
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,db,diskSpace
        liveness:
          include: livenessState,ping
  health:
    redis:
      enabled: false
  info:
    env:
      enabled: true

info:
  app:
    name: java-interview-prep-platform
    description: Production-ready Spring Boot backend for Java Interview Prep
    version: 1.0.0

logging:
  level:
    root: INFO
    com.interviewprep.platform: DEBUG
    org.hibernate.SQL: DEBUG
